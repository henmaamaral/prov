<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
<div id="tela-inicial">
    <div class="modal">
        <h2>Bem-vindo, jogo da memória pokemon!</h2>
        <input type="text" id="input-nome" placeholder="Digite seu nome..." required>
        <button id="btn-iniciar">Iniciar Jogo</button>
    </div>
</div>
    <button id="btn-portal">Abrir Portal (Fetch API)</button>

<div id="loader" class="hidden">
    <div class="portal-loader"></div>
    <p>Sintonizando dimensão</p>
</div>
<div id="placar">
    Erros: <span id="erros">0</span>
</div>
<div id="timer">
    Tempo: <span id="tempo">0</span>s
</div>
<div id="resultados">
    <p>O portal está fechado.</p>
</div>
<div id="modal-ranking" class="hidden">
    <h3>Top 10 Jogadores</h3>
    <table id="tabela-ranking">
        <thead>
            <tr><th>Nome</th><th>Tempo (s)</th></tr>
        </thead>
        <tbody id="corpo-ranking"></tbody>
    </table>
    <button onclick="document.getElementById('modal-ranking').classList.add('hidden')">Fechar</button>
</div>
<script src="script_db.js"></script>
<script src="script.js"></script>
</body>
</html>
